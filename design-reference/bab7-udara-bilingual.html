<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bab 7: Udara — Bilingual Redesign — AcadeMY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#050816; --bg-panel:#0c1128; --bg-card:#111632; --bg-card-hover:#151b3d;
    --line:rgba(148,163,184,0.14);
    --violet:#8b6bff; --violet-soft:rgba(139,107,255,0.16);
    --blue:#4fb0ff; --blue-soft:rgba(79,176,255,0.14);
    --amber:#fbbf5a; --amber-soft:rgba(251,191,90,0.16);
    --green:#4ade80; --green-soft:rgba(74,222,128,0.12);
    --red:#f87171; --red-soft:rgba(248,113,113,0.12);
    --orange:#fb923c;
    --text:#eef1fb; --muted:#93a0c2; --muted-dim:#6b7593;
    --font-display:'Space Grotesk', sans-serif; --font-body:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(139,107,255,0.16), transparent 60%),
      radial-gradient(ellipse 700px 500px at 110% 20%, rgba(79,176,255,0.10), transparent 60%),
      var(--bg-deep);
    color:var(--text); font-family:var(--font-body); min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .app{display:flex; min-height:100vh;}
  .sidebar{width:220px; flex-shrink:0; padding:28px 20px; border-right:1px solid var(--line); display:flex; flex-direction:column; gap:28px;}
  .logo{display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-weight:700; font-size:17px;}
  .logo .dot{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--violet),var(--blue));display:flex;align-items:center;justify-content:center;font-size:14px;}
  .logo span.hl{color:var(--amber);}
  .navlist{display:flex; flex-direction:column; gap:3px;}
  .navlist a{color:var(--muted-dim); text-decoration:none; font-size:13.5px; font-weight:500; padding:9px 10px; border-radius:8px; display:flex; align-items:center; gap:10px;}
  .navlist a.active{background:var(--violet-soft); color:#cfc2ff;}

  .main{flex:1; padding:36px 48px 80px; max-width:1020px; margin:0 auto;}
  .topline{display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:12px;}
  .crumb{color:var(--muted-dim); font-size:12.5px; letter-spacing:.03em;}
  .crumb b{color:var(--muted);}
  .toolbar-right{display:flex; gap:10px; align-items:center;}
  .streak{display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--amber); font-weight:600;}
  .accuracy-badge{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--green); background:var(--green-soft); border:1px solid rgba(74,222,128,0.3); padding:5px 11px; border-radius:20px; font-weight:600;}

  .lang-toggle{display:flex; background:var(--bg-panel); border:1px solid var(--line); border-radius:20px; padding:3px; gap:2px;}
  .lang-btn{border:none; background:transparent; color:var(--muted-dim); font-family:var(--font-body); font-weight:700; font-size:12px; padding:7px 16px; border-radius:18px; cursor:pointer; transition:all .2s;}
  .lang-btn.active{background:linear-gradient(135deg,var(--violet),var(--blue)); color:#fff;}

  .hook{background:linear-gradient(120deg, rgba(139,107,255,0.14), rgba(79,176,255,0.08)); border:1px solid rgba(139,107,255,0.28); border-radius:16px; padding:20px 24px; margin-bottom:26px; display:flex; gap:16px; align-items:center;}
  .hook .icon{font-size:26px; flex-shrink:0;}
  .hook .title{font-family:var(--font-display); font-weight:700; font-size:19px; margin:0 0 4px;}
  .hook p{margin:0; color:var(--muted); font-size:14px; line-height:1.5;}

  .orbit-track{display:flex; align-items:center; justify-content:space-between; margin-bottom:30px; padding:0 2px; position:relative; overflow-x:auto; gap:4px;}
  .orbit-track::before{content:''; position:absolute; top:15px; left:16px; right:16px; height:2px; background:var(--line); z-index:0;}
  .orbit-node{position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; background:transparent; border:none; font-family:var(--font-body); flex-shrink:0; width:76px;}
  .orbit-dot{width:30px;height:30px;border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12.5px; background:var(--bg-panel); border:2px solid var(--line); color:var(--muted-dim); transition:all .25s ease;}
  .orbit-node.done .orbit-dot{background:linear-gradient(135deg,var(--violet),var(--blue)); border-color:transparent; color:#fff;}
  .orbit-node.current .orbit-dot{border-color:var(--blue); color:var(--blue); box-shadow:0 0 0 4px var(--blue-soft);}
  .orbit-label{font-size:9.5px; color:var(--muted-dim); max-width:74px; text-align:center; line-height:1.2;}
  .orbit-node.current .orbit-label{color:var(--text); font-weight:600;}

  .card{background:var(--bg-card); border:1px solid var(--line); border-radius:20px; padding:32px 36px; min-height:420px; position:relative; overflow:hidden;}
  .card::before{content:''; position:absolute; top:-60px; right:-60px; width:200px; height:200px; border-radius:50%; background:radial-gradient(circle, rgba(139,107,255,0.10), transparent 70%); pointer-events:none;}
  .sec-eyebrow{display:flex; align-items:center; gap:8px; color:var(--blue); font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px;}
  .sec-title{font-family:var(--font-display); font-size:24px; font-weight:700; margin:0 0 8px;}
  .sec-sub{font-size:13.5px; color:var(--muted); margin:0 0 22px; line-height:1.5;}

  .section-panel{display:none; animation:fadeIn .35s ease;}
  .section-panel.active{display:block;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  .card-nav{display:flex; justify-content:space-between; align-items:center; margin-top:28px;}
  .btn{font-family:var(--font-body); font-weight:600; font-size:13.5px; border-radius:10px; border:1px solid var(--line); background:var(--bg-panel); color:var(--text); padding:11px 20px; cursor:pointer; display:flex; align-items:center; gap:8px; transition:all .15s ease;}
  .btn:hover{background:var(--bg-card-hover); border-color:rgba(148,163,184,0.3);}
  .btn.primary{background:linear-gradient(135deg,var(--violet),var(--blue)); border:none; color:#fff;}
  .btn.primary:hover{filter:brightness(1.08);}
  .btn:disabled{opacity:.35; cursor:not-allowed;}

  .comp-layout{display:flex; gap:40px; align-items:center; flex-wrap:wrap;}
  .donut-wrap{position:relative; width:190px; height:190px; flex-shrink:0;}
  .donut-wrap svg{transform:rotate(-90deg);}
  .donut-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .donut-center .n{font-family:var(--font-display); font-size:24px; font-weight:700;}
  .donut-center .l{font-size:10.5px; color:var(--muted-dim); text-align:center;}
  .comp-legend{display:flex; flex-direction:column; gap:10px; flex:1; min-width:220px;}
  .legend-row{display:flex; align-items:center; gap:10px; font-size:13.5px; padding:8px 12px; border-radius:10px; background:var(--bg-panel);}
  .legend-swatch{width:12px;height:12px;border-radius:3px; flex-shrink:0;}
  .legend-row b{margin-left:auto; font-family:var(--font-display); font-size:13.5px;}

  .reveal-chip{display:inline-flex; align-items:center; gap:8px; padding:9px 15px; border-radius:10px; background:var(--violet-soft); border:1px dashed rgba(139,107,255,0.45); color:#cfc2ff; font-size:13px; font-weight:600; cursor:pointer; margin:6px 8px 0 0;}
  .reveal-box{margin-top:12px; padding:15px 17px; border-radius:12px; background:var(--bg-panel); border:1px solid var(--line); font-size:13.5px; color:var(--muted); line-height:1.55; display:none;}
  .reveal-box.open{display:block; animation:fadeIn .3s ease;}
  .reveal-set{margin-top:20px;}

  .exp-steps{display:flex; gap:14px; margin-bottom:22px; flex-wrap:wrap;}
  .exp-step{flex:1; min-width:150px; background:var(--bg-panel); border:1px solid var(--line); border-radius:14px; padding:16px; text-align:center;}
  .exp-step .emoji{font-size:28px; margin-bottom:8px; display:block;}
  .exp-step .cap{font-size:12.5px; color:var(--muted); line-height:1.4;}
  .predict-box{background:var(--blue-soft); border:1px solid rgba(79,176,255,0.3); border-radius:14px; padding:20px;}
  .predict-box .q{font-weight:600; font-size:14.5px; margin-bottom:14px;}
  .predict-opts{display:flex; gap:10px; flex-wrap:wrap;}
  .predict-opt{padding:10px 16px; border-radius:10px; background:var(--bg-panel); border:1px solid var(--line); font-size:13.5px; cursor:pointer; font-weight:500;}
  .predict-opt.correct{background:rgba(74,222,128,0.16); border-color:var(--green); color:var(--green);}
  .predict-opt.wrong{background:rgba(248,113,113,0.16); border-color:var(--red); color:var(--red);}
  .predict-feedback{margin-top:14px; font-size:13.5px; color:var(--muted); display:none; line-height:1.5;}
  .predict-feedback.show{display:block; animation:fadeIn .3s ease;}

  .gas-tabs{display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;}
  .gas-tab{flex:1; min-width:90px; padding:12px; border-radius:12px; border:1px solid var(--line); background:var(--bg-panel); cursor:pointer; text-align:center; transition:all .2s;}
  .gas-tab.active{border-color:var(--violet); background:var(--violet-soft);}
  .gas-tab .sym{font-family:var(--font-display); font-size:18px; font-weight:700;}
  .gas-tab .name{font-size:11px; color:var(--muted); margin-top:2px;}
  .use-grid{display:none; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px;}
  .use-grid.active{display:grid;}
  .use-card{background:var(--bg-panel); border:1px solid var(--line); border-radius:12px; padding:14px; font-size:12.5px; text-align:center; line-height:1.4;}
  .use-card .ic{font-size:20px; display:block; margin-bottom:6px;}
  .use-card b{display:block; font-size:12px; margin-bottom:2px;}
  .use-card span{color:var(--muted-dim); font-size:11px;}

  .cycle-row{display:grid; grid-template-columns:1fr 1fr; gap:22px;}
  .cycle-box{background:var(--bg-panel); border:1px solid var(--line); border-radius:14px; padding:18px;}
  .cycle-box h4{margin:0 0 12px; font-family:var(--font-display); font-size:15px;}
  .cycle-list{margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:8px;}
  .cycle-list li{font-size:12px; color:var(--muted); display:flex; gap:8px; align-items:flex-start; line-height:1.4;}
  .cycle-list li::before{content:'→'; color:var(--blue); flex-shrink:0;}
  .balance-chips{display:flex; flex-wrap:wrap; gap:8px; margin-top:18px;}
  .balance-chip{background:rgba(74,222,128,0.12); border:1px solid rgba(74,222,128,0.3); color:var(--green); padding:8px 14px; border-radius:20px; font-size:12px; font-weight:500;}

  .triangle-wrap{display:flex; justify-content:center; margin:10px 0 26px;}
  .fire-tri{position:relative; width:240px; height:200px;}
  .fire-tri .node{position:absolute; width:80px; height:80px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--bg-panel); border:2px solid var(--amber); font-size:24px;}
  .fire-tri .node span.lbl{font-size:10px; color:var(--muted); margin-top:2px; font-weight:600;}
  .fire-tri .n1{top:0; left:80px;}
  .fire-tri .n2{bottom:0; left:0;}
  .fire-tri .n3{bottom:0; right:0;}
  .method-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; margin-bottom:26px;}
  .method-card{background:var(--bg-panel); border:1px solid var(--line); border-radius:12px; padding:16px;}
  .method-card .ic{font-size:22px;}
  .method-card h5{margin:8px 0 6px; font-size:13.5px; font-family:var(--font-display);}
  .method-card p{margin:0; font-size:11.5px; color:var(--muted); line-height:1.4;}

  .ext-table{width:100%; border-collapse:collapse; margin-bottom:26px; font-size:12.5px;}
  .ext-table th{text-align:left; color:var(--muted-dim); font-weight:600; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; padding:0 12px 10px;}
  .ext-table td{background:var(--bg-panel); padding:12px; vertical-align:top; border-top:6px solid var(--bg-card);}
  .ext-table tr td:first-child{border-radius:10px 0 0 10px; font-weight:600;}
  .ext-table tr td:last-child{border-radius:0 10px 10px 0;}
  .pill{display:inline-block; background:var(--violet-soft); color:#cfc2ff; padding:3px 9px; border-radius:20px; font-size:11px; margin:2px 3px 0 0;}

  .safety-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:10px;}
  .safety-item{display:flex; gap:10px; align-items:flex-start; background:var(--bg-panel); border:1px solid var(--line); border-radius:10px; padding:11px 13px; font-size:12px; color:var(--muted); line-height:1.4;}
  .safety-item .chk{width:18px; height:18px; border-radius:5px; border:2px solid var(--green); flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--green); font-size:11px; margin-top:1px;}

  .source-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:14px;}
  .source-card{background:var(--bg-panel); border:1px solid var(--line); border-radius:14px; padding:16px;}
  .source-card .from{font-size:11px; color:var(--muted-dim); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; font-weight:700;}
  .source-card .pollutants{margin-top:10px; display:flex; flex-wrap:wrap; gap:5px;}
  .tag{font-size:10.5px; background:var(--red-soft); color:#ffb4b4; padding:3px 8px; border-radius:20px;}

  .effects-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px;}
  .effect-card{border-radius:14px; padding:16px; border:1px solid var(--line);}
  .effect-card h5{margin:0 0 10px; font-family:var(--font-display); font-size:14px; display:flex; align-items:center; gap:8px;}
  .effect-card ul{margin:0; padding-left:16px; font-size:12px; color:var(--muted); line-height:1.5;}
  .effect-health{background:rgba(248,113,113,0.06);}
  .effect-build{background:rgba(251,191,90,0.06);}
  .effect-plant{background:rgba(74,222,128,0.06);}
  .effect-climate{background:rgba(79,176,255,0.06);}

  .prevent-cols{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px;}
  .prevent-col{background:var(--bg-panel); border:1px solid var(--line); border-radius:14px; padding:16px;}
  .prevent-col h5{margin:0 0 10px; font-family:var(--font-display); font-size:13.5px; color:var(--blue);}
  .prevent-col ul{margin:0; padding-left:16px; font-size:12px; color:var(--muted); line-height:1.6;}

  .api-row{display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:10px; margin-bottom:6px;}
  .api-range{font-family:var(--font-display); font-weight:700; min-width:80px;}
  .api-label{font-weight:600; flex:1;}
  .api-good{background:rgba(74,222,128,0.14); color:var(--green);}
  .api-mod{background:rgba(251,191,90,0.14); color:var(--amber);}
  .api-unh{background:rgba(251,146,60,0.14); color:var(--orange);}
  .api-vunh{background:rgba(248,113,113,0.14); color:var(--red);}
  .api-haz{background:rgba(194,65,12,0.22); color:#ff9d7a;}

  .flip-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; margin-bottom:8px;}
  .flip-card{background:rgba(74,222,128,0.08); border:1px solid rgba(74,222,128,0.25); border-radius:12px; padding:14px 16px; font-size:12.5px; color:#c8f5d8; line-height:1.5; display:flex; gap:10px; align-items:flex-start;}
  .flip-card .num{width:20px; height:20px; border-radius:50%; background:rgba(74,222,128,0.25); color:var(--green); font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;}

  .glossary-wrap{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px;}
  .glossary-chip{background:var(--bg-panel); border:1px solid var(--line); color:var(--muted); padding:7px 13px; border-radius:20px; font-size:12px;}

  .summary-box{background:linear-gradient(120deg, rgba(139,107,255,0.12), rgba(79,176,255,0.06)); border:1px solid rgba(139,107,255,0.28); border-radius:14px; padding:20px 22px; margin:24px 0;}
  .summary-box h4{margin:0 0 8px; font-family:var(--font-display); font-size:15px; display:flex; gap:8px; align-items:center;}
  .summary-box p{margin:0; font-size:13px; color:var(--muted); line-height:1.55;}

  .complete-row{display:flex; justify-content:center; margin-top:10px;}
  .xp-toast{position:fixed; top:26px; left:50%; transform:translateX(-50%) translateY(-140%); z-index:50; background:linear-gradient(135deg,var(--violet),var(--blue)); color:#fff; font-weight:700; font-size:14px; padding:14px 22px; border-radius:14px; box-shadow:0 10px 30px rgba(79,88,255,0.4); display:flex; gap:8px; align-items:center; transition:transform .4s cubic-bezier(.34,1.56,.64,1);}
  .xp-toast.show{transform:translateX(-50%) translateY(0);}

  .subhead{font-family:var(--font-display); font-weight:700; font-size:14px; margin:22px 0 10px; display:flex; align-items:center; gap:8px;}
  .subhead:first-child{margin-top:0;}

  @media(max-width:760px){
    .sidebar{display:none;}
    .main{padding:24px 18px 60px;}
    .cycle-row{grid-template-columns:1fr;}
    .comp-layout{flex-direction:column; align-items:flex-start;}
    .orbit-label{display:none;}
    .orbit-node{width:40px;}
  }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="logo"><div class="dot">🚀</div>Academ<span class="hl">Y</span></div>
    <div class="navlist" id="navlist"></div>
  </div>

  <div class="main">

    <div class="topline">
      <div class="crumb" id="crumb"></div>
      <div class="toolbar-right">
        <div class="accuracy-badge" id="accBadge"></div>
        <div class="lang-toggle">
          <button class="lang-btn active" id="btnEn" onclick="setLang('en')">EN · DLP</button>
          <button class="lang-btn" id="btnBm" onclick="setLang('bm')">BM</button>
        </div>
      </div>
    </div>

    <div class="hook">
      <div class="icon">🌬️</div>
      <div>
        <p class="title" id="hookTitle"></p>
        <p id="hookText"></p>
      </div>
    </div>

    <div class="orbit-track" id="orbitTrack"></div>

    <div class="card" id="cardShell">

      <!-- 1: Composition -->
      <div class="section-panel active" data-index="0">
        <div class="sec-eyebrow">◆ 7.1</div>
        <h2 class="sec-title" id="s0-title"></h2>
        <p class="sec-sub" id="s0-sub"></p>

        <div class="comp-layout">
          <div class="donut-wrap">
            <svg width="190" height="190" viewBox="0 0 190 190">
              <circle cx="95" cy="95" r="76" fill="none" stroke="#1b2044" stroke-width="24"/>
              <circle id="arcN2" cx="95" cy="95" r="76" fill="none" stroke="#4fb0ff" stroke-width="24" stroke-linecap="round"/>
              <circle id="arcO2" cx="95" cy="95" r="76" fill="none" stroke="#8b6bff" stroke-width="24" stroke-linecap="round"/>
              <circle id="arcCO2" cx="95" cy="95" r="76" fill="none" stroke="#fbbf5a" stroke-width="24" stroke-linecap="round"/>
              <circle id="arcOther" cx="95" cy="95" r="76" fill="none" stroke="#4ade80" stroke-width="24" stroke-linecap="round"/>
            </svg>
            <div class="donut-center"><div class="n">100%</div><div class="l" id="donutLabel"></div></div>
          </div>
          <div class="comp-legend" id="legend"></div>
        </div>

        <div class="reveal-set" id="revealSet0"></div>
      </div>

      <!-- 2: Experiment -->
      <div class="section-panel" data-index="1">
        <div class="sec-eyebrow" id="s1-eyebrow"></div>
        <h2 class="sec-title" id="s1-title"></h2>
        <p class="sec-sub" id="s1-sub"></p>
        <div class="exp-steps" id="expSteps"></div>
        <div class="predict-box">
          <div class="q" id="predictQ"></div>
          <div class="predict-opts" id="predictOpts"></div>
          <div class="predict-feedback" id="predictFeedback"></div>
        </div>
      </div>

      <!-- 3: Uses -->
      <div class="section-panel" data-index="2">
        <div class="sec-eyebrow" id="s2-eyebrow"></div>
        <h2 class="sec-title" id="s2-title"></h2>
        <p class="sec-sub" id="s2-sub"></p>
        <div class="gas-tabs" id="gasTabs"></div>
        <div id="useGrids"></div>
      </div>

      <!-- 4: Cycles -->
      <div class="section-panel" data-index="3">
        <div class="sec-eyebrow" id="s3-eyebrow"></div>
        <h2 class="sec-title" id="s3-title"></h2>
        <p class="sec-sub" id="s3-sub"></p>
        <div class="cycle-row" id="cycleRow"></div>
        <div class="subhead" id="balanceHead"></div>

function el(tag, cls, html){ const e=document.createElement(tag); if(cls) e.className=cls; if(html!==undefined) e.innerHTML=html; return e; }

function renderNav(){
  const list = document.getElementById('navlist');
  list.innerHTML = nav[lang].map(([ic,label], i) => `<a href="#" class="${i===2?'active':''}">${ic} ${label}</a>`).join('');
}

function renderOrbit(){
  const track = document.getElementById('orbitTrack');
  track.innerHTML = orbitLabels[lang].map((label,i) => `
    <button class="orbit-node ${i<current?'done':''} ${i===current?'current':''}" onclick="jump(${i})">
      <div class="orbit-dot">${i<current ? '✓' : i+1}</div>
      <div class="orbit-label">${label}</div>
    </button>`).join('');
}

function renderPanels(){
  document.querySelectorAll('.section-panel').forEach(p => p.classList.toggle('active', Number(p.dataset.index) === current));
  document.getElementById('prevBtn').disabled = current === 0;
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.style.display = current === 8 ? 'none' : 'flex';
}

function go(dir){ current = Math.max(0, Math.min(8, current+dir)); renderOrbit(); renderPanels(); document.getElementById('cardShell').scrollIntoView({behavior:'smooth', block:'start'}); }
function jump(i){ current = i; renderOrbit(); renderPanels(); }
function toggleReveal(id){ document.getElementById(id).classList.toggle('open'); }
function checkPredict(el, isCorrect){ document.querySelectorAll('.predict-opt').forEach(o => o.classList.remove('correct','wrong')); el.classList.add(isCorrect ? 'correct' : 'wrong'); document.getElementById('predictFeedback').classList.add('show'); }
function switchGasTab(idx, elm){ document.querySelectorAll('.gas-tab').forEach(t => t.classList.remove('active')); elm.classList.add('active'); document.querySelectorAll('.use-grid').forEach(g => g.classList.toggle('active', g.dataset.gas == idx)); }
function markComplete(){ const toast = document.getElementById('xpToast'); toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2600); }

function setLang(l){
  lang = l;
  document.getElementById('btnEn').classList.toggle('active', l==='en');
  document.getElementById('btnBm').classList.toggle('active', l==='bm');
  renderAll();
}

function drawDonut(){
  const R = 76, C = 2*Math.PI*R;
  const segs = [{id:'arcN2', pct:78}, {id:'arcO2', pct:21}, {id:'arcCO2', pct:0.6}, {id:'arcOther', pct:0.4}];
  let offset = 0;
  segs.forEach(s => {
    const len = (s.pct/100)*C;
    const e = document.getElementById(s.id);
    e.style.strokeDasharray = `${len} ${C-len}`;
    e.style.strokeDashoffset = -offset;
    offset += len;
  });
}

window.addEventListener('DOMContentLoaded', () => { drawDonut(); renderAll(); });
</script>
